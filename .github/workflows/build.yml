name: Deploy Digital Garden to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Позволяет запускать вручную

# Разрешения для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Позволяет только один одновременный деплой
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Укажите путь к папке с готовым HTML-сайтом
          # Если вы копируете файлы в корень репо:
          path: '.'
          # ИЛИ если сайт лежит в docs/site/:
          # path: 'docs/site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
